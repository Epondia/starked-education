name: Release & Changelog

on:
  # Trigger manually from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch | minor | major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

  # Also trigger automatically when a tag matching v* is pushed
  push:
    tags:
      - 'v*'

  # Lint commit messages on every pull request
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Create a release commit, bump version, generate changelog
  # (only runs on workflow_dispatch — not on tag pushes)
  # ──────────────────────────────────────────────────────────────
  release:
    name: Bump version & generate changelog
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version & update CHANGELOG.md
        run: npm run release:${{ github.event.inputs.release_type }}
        env:
          # standard-version reads this when creating the GitHub link in the changelog
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push release commit and tag
        run: |
          git push --follow-tags origin HEAD

  # ──────────────────────────────────────────────────────────────
  # Job 2: Create a GitHub Release with the changelog body
  # (runs when a v* tag lands — whether pushed manually or by job 1)
  # ──────────────────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: extract-changelog
        run: |
          # Pull out the section between the two most recent version headings
          VERSION="${GITHUB_REF_NAME}"          # e.g. v0.2.0
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Fallback: if no matching section found, use a generic message
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write multi-line value to GITHUB_OUTPUT
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.extract-changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # mark as pre-release if tag contains a dash (e.g. v1.0.0-beta.1)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Job 3: Validate commit messages on every PR
  # ──────────────────────────────────────────────────────────────
  commitlint:
    name: Lint commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint commits in this PR
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
