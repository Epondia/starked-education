openapi: 3.0.3
info:
  title: StarkEd Education API
  version: 1.0.0
  description: |
    OpenAPI 3.0 specification for the StarkEd decentralized education platform backend.

    All public endpoints are mounted under the `/api/v1` prefix. Authentication
    is performed via Bearer JWT tokens issued by the `/api/v1/auth/login` endpoint.

    The interactive Swagger UI is served at `/api/docs`.
  contact:
    name: StarkEd Education
    url: https://github.com/Epondia/starked-education
  license:
    name: MIT
    url: https://github.com/Epondia/starked-education/blob/main/LICENSE

servers:
  - url: http://localhost:3001/api/v1
    description: Local development server
  - url: /api/v1
    description: Same-origin (relative)

tags:
  - name: Auth
    description: Authentication, registration, and user profile management
  - name: Courses
    description: Course discovery, enrollment, and progress tracking
  - name: Content
    description: Course content upload, retrieval and version management
  - name: Quizzes
    description: Quiz authoring and submission
  - name: Assignments
    description: Assignment submission, grading and feedback
  - name: Events
    description: Event logger for platform observability
  - name: Sync
    description: Offline sync coordination
  - name: Notifications
    description: User notifications
  - name: Transactions
    description: Stellar transaction queue and operations
  - name: Collaboration
    description: Real-time collaboration rooms
  - name: Holographic
    description: Holographic content storage
  - name: ACO
    description: Ant Colony Optimization learning path service
  - name: Federated Learning
    description: Federated learning coordinator
  - name: Swarm Learning
    description: Swarm learning lifecycle
  - name: Smart Wallet
    description: Smart wallet deployment and operations
  - name: Secure Communication
    description: Quantum-resistant secure realtime communication
  - name: AGI Tutor
    description: AGI-powered tutoring sessions
  - name: Analytics
    description: Platform analytics and reporting
  - name: RBAC
    description: Role-based access control
  - name: Admin
    description: Administrative operations
  - name: Gamification
    description: Leaderboards, achievements and challenges
  - name: Time Lock
    description: Time-locked credential issuance
  - name: VRF
    description: Verifiable Random Function endpoints
  - name: Translation
    description: Real-time translation services
  - name: Cross Protocol Bridge
    description: Cross-protocol blockchain bridge
  - name: Autonomous Agents
    description: Autonomous agent status, tickets and metrics
  - name: Health
    description: Service health and version info

paths:
  # ─── Auth ──────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              instructor:
                value:
                  username: jane_doe
                  email: jane@example.com
                  password: S3cretP@ssw0rd!
                  role: instructor
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login and obtain a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              student:
                value:
                  email: alice@example.com
                  password: S3cretP@ssw0rd!
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                ok:
                  value:
                    token: eyJhbGciOiJIUzI1NiIs...
                    user:
                      id: 5f8c0a1b2c3d4e5f6a7b8c9d
                      username: alice
                      email: alice@example.com
                      role: student
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/profile:
    get:
      tags:
        - Auth
      summary: Get the authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Courses / Content ─────────────────────────────────────────────
  /courses:
    $ref: '#/paths/~1content~1courses'

  /content/courses:
    get:
      tags:
        - Courses
      summary: List available courses
      description: Returns the catalog of courses. Supports filter and pagination.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Course list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
              examples:
                sample:
                  value:
                    - id: course_101
                      title: Introduction to Stellar
                      description: Fundamentals of the Stellar blockchain.
                      instructor: jane_doe
                      publishedAt: 1718000000
                    - id: course_102
                      title: Smart Contracts with Soroban
                      description: Build decentralized apps on Soroban.
                      instructor: carl_lewis
                      publishedAt: 1718200000
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Courses
      summary: Create a new course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreate'
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /content/courses/{courseId}:
    parameters:
      - in: path
        name: courseId
        required: true
        schema:
          type: string
    get:
      tags:
        - Courses
      summary: Get a single course by ID
      responses:
        '200':
          description: Course detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Courses
      summary: Update a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpdate'
      responses:
        '200':
          description: Updated course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Courses
      summary: Delete a course
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Course deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /content/{contentId}:
    parameters:
      - in: path
        name: contentId
        required: true
        schema:
          type: string
    get:
      tags:
        - Content
      summary: Retrieve piece of content
      responses:
        '200':
          description: Content metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Content'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /content:
    post:
      tags:
        - Content
      summary: Upload new content
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentUpload'
      responses:
        '201':
          description: Content created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Content'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Quizzes ───────────────────────────────────────────────────────
  /quizzes:
    get:
      tags:
        - Quizzes
      summary: List quizzes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Quiz list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Quiz'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Quizzes
      summary: Create a quiz
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizCreate'
      responses:
        '201':
          description: Quiz created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /quizzes/{quizId}:
    parameters:
      - in: path
        name: quizId
        required: true
        schema:
          type: string
    get:
      tags:
        - Quizzes
      summary: Get quiz by ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Quiz
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Quizzes
      summary: Submit quiz answers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizSubmission'
      responses:
        '200':
          description: Graded quiz result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Assignments ───────────────────────────────────────────────────
  /assignments:
    get:
      tags:
        - Assignments
      summary: List assignments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Assignment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Assignments
      summary: Create assignment (instructor)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreate'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assignments/{assignmentId}/submit:
    parameters:
      - in: path
        name: assignmentId
        required: true
        schema:
          type: string
    post:
      tags:
        - Assignments
      summary: Submit an assignment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentSubmission'
      responses:
        '200':
          description: Submission accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Events ─────────────────────────────────────────────────────────
  /events:
    get:
      tags:
        - Events
      summary: List platform events
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Events
      summary: Record an event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreate'
      responses:
        '201':
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Sync ───────────────────────────────────────────────────────────
  /sync/status:
    get:
      tags:
        - Sync
      summary: Get offline sync status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sync/push:
    post:
      tags:
        - Sync
      summary: Push offline-queued changes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPushRequest'
      responses:
        '200':
          description: Sync results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Notifications ──────────────────────────────────────────────────
  /notifications:
    get:
      tags:
        - Notifications
      summary: List current user notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Notifications
      summary: Send a notification (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreate'
      responses:
        '201':
          description: Notification dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Transactions ───────────────────────────────────────────────────
  /transactions:
    get:
      tags:
        - Transactions
      summary: List transactions visible to the user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Transactions
      summary: Submit a Stellar transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreate'
      responses:
        '201':
          description: Transaction queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Collaboration ─────────────────────────────────────────────────
  /collaboration/rooms:
    get:
      tags:
        - Collaboration
      summary: List active collaboration rooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Room list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollaborationRoom'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Collaboration
      summary: Create a collaboration room
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollaborationRoomCreate'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaborationRoom'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Holographic Storage ────────────────────────────────────────────
  /holographic/status:
    get:
      tags:
        - Holographic
      summary: Get holographic storage status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Holographic status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolographicStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── ACO ────────────────────────────────────────────────────────────
  /aco/analytics:
    get:
      tags:
        - ACO
      summary: Get ACO learning path analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Analytics payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /aco/optimize:
    post:
      tags:
        - ACO
      summary: Run learning path optimization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ACORequest'
      responses:
        '200':
          description: Optimization result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ACOResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Federated Learning ────────────────────────────────────────────
  /federated-learning/sessions:
    get:
      tags:
        - Federated Learning
      summary: List federated learning sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FederatedSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Federated Learning
      summary: Create a new federated learning session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FederatedSessionCreate'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederatedSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Swarm Learning ─────────────────────────────────────────────────
  /swarm-learning/swarms:
    get:
      tags:
        - Swarm Learning
      summary: List active swarms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Swarm list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Swarm'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Smart Wallet ───────────────────────────────────────────────────
  /smart-wallet/deploy:
    post:
      tags:
        - Smart Wallet
      summary: Deploy a smart wallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmartWalletDeployRequest'
      responses:
        '200':
          description: Deployed wallet info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartWallet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Secure Communication ──────────────────────────────────────────
  /secure-comm/keys:
    get:
      tags:
        - Secure Communication
      summary: List secure communication keys for the caller
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecureCommKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── AGI Tutor ──────────────────────────────────────────────────────
  /agi-tutor/sessions:
    post:
      tags:
        - AGI Tutor
      summary: Start a tutoring session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AGITutorSessionCreate'
      responses:
        '201':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AGITutorSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Analytics ──────────────────────────────────────────────────────
  /analytics/overview:
    get:
      tags:
        - Analytics
      summary: Platform analytics overview
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── RBAC ───────────────────────────────────────────────────────────
  /rbac/roles:
    get:
      tags:
        - RBAC
      summary: List available roles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role descriptors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Admin ──────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      tags:
        - Admin
      summary: Admin dashboard summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboard'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Gamification ───────────────────────────────────────────────────
  /gamification/leaderboard:
    get:
      tags:
        - Gamification
      summary: Get current leaderboard
      responses:
        '200':
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Time-Locked Credentials ───────────────────────────────────────
  /time-lock/credentials:
    post:
      tags:
        - Time Lock
      summary: Mint a new time-locked credential
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeLockCredentialCreate'
      responses:
        '201':
          description: Credential minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── VRF ────────────────────────────────────────────────────────────
  /vrf/random:
    post:
      tags:
        - VRF
      summary: Request verifiable randomness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VRFRequest'
      responses:
        '200':
          description: Verifiable random output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VRFResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Translation ────────────────────────────────────────────────────
  /translate:
    post:
      tags:
        - Translation
      summary: Translate text in real time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslationRequest'
      responses:
        '200':
          description: Translated text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Cross Protocol Bridge ──────────────────────────────────────────
  /cross-protocol-bridge/transfer:
    post:
      tags:
        - Cross Protocol Bridge
      summary: Initiate cross-protocol transfer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BridgeTransferRequest'
      responses:
        '202':
          description: Transfer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Autonomous Agents ──────────────────────────────────────────────
  /autonomous-agents/status:
    get:
      tags:
        - Autonomous Agents
      summary: Get overall status of autonomous agents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Agent status summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatusSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Health (utility) ───────────────────────────────────────────────
  /health:
    get:
      tags:
        - Health
      summary: Liveness / health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
              examples:
                ok:
                  value:
                    status: healthy
                    uptime: 123.45
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      description: |
        Bearer JWT tokens issued by `/api/v1/auth/login`. Include the token in the
        Authorization header as `Authorization: Bearer <token>`.
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad request invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden caller lacks the required role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict duplicate key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid request payload
      required:
        - success
        - message
    Health:
      type: object
      properties:
        status:
          type: string
          example: healthy
        uptime:
          type: number
          example: 123.45
        supportedVersions:
          type: array
          items:
            type: string
          example:
            - v1
            - v2

    User:
      type: object
      description: Public representation of a StarkEd user.
      properties:
        id:
          type: string
          description: Internal user identifier
          example: 5f8c0a1b2c3d4e5f6a7b8c9d
        owner:
          type: string
          description: Stellar public address used as the on-chain owner identity
          example: GXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
        username:
          type: string
          example: jane_doe
        email:
          type: string
          format: email
          example: jane@example.com
        role:
          $ref: '#/components/schemas/UserRole'
        bio:
          type: string
          example: Educator passionate about decentralized learning.
        avatarUrl:
          type: string
          format: uri
          example: https://cdn.starked.education/avatars/jane.png
        createdAt:
          type: integer
          description: Unix epoch seconds when the account was created
          example: 1718000000
        updatedAt:
          type: integer
          example: 1718200000
        achievements:
          type: array
          items:
            type: integer
          description: IDs of achievements earned by the user
        credentials:
          type: array
          items:
            type: integer
          description: IDs of credentials held by the user
        reputation:
          type: integer
          minimum: 0
          example: 120
        privacyLevel:
          $ref: '#/components/schemas/PrivacyLevel'
      required:
        - id
        - username
        - email
        - role

    UserRole:
      type: string
      enum:
        - student
        - instructor
        - educator
        - admin
        - moderator
      example: student

    PrivacyLevel:
      type: string
      enum:
        - Public
        - Private
        - FriendsOnly
      example: Public

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: jane_doe
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          example: S3cretP@ssw0rd!
        role:
          $ref: '#/components/schemas/UserRole'

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: Bearer JWT signed with HS256
        user:
          $ref: '#/components/schemas/User'

    Course:
      type: object
      properties:
        id:
          type: string
          example: course_101
        title:
          type: string
          example: Introduction to Stellar
        description:
          type: string
        instructor:
          type: string
          description: Username of the course instructor
        publishedAt:
          type: integer
          nullable: true
          description: Unix epoch seconds; null if draft
        tags:
          type: array
          items:
            type: string
        credits:
          type: number
          example: 3
      required:
        - id
        - title
        - instructor

    CourseCreate:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        credits:
          type: number

    CourseUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        credits:
          type: number

    Content:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        type:
          type: string
          enum:
            - video
            - document
            - quiz
            - assignment
        title:
          type: string
        url:
          type: string
          format: uri
        sizeBytes:
          type: integer
        version:
          type: integer
          example: 1
        createdAt:
          type: integer
      required:
        - id
        - courseId
        - type
        - title

    ContentUpload:
      type: object
      required:
        - courseId
        - type
        - title
      properties:
        courseId:
          type: string
        type:
          type: string
          enum:
            - video
            - document
            - quiz
            - assignment
        title:
          type: string
        url:
          type: string
          format: uri

    Enrollment:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        courseId:
          type: string
        status:
          type: string
          enum:
            - active
            - completed
            - dropped
            - suspended
        progress:
          type: number
          minimum: 0
          maximum: 100
        enrolledAt:
          type: integer
        completedAt:
          type: integer
          nullable: true
      required:
        - id
        - userId
        - courseId
        - status

    Credential:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        courseId:
          type: string
        title:
          type: string
        issuedAt:
          type: integer
        unlockAt:
          type: integer
          nullable: true
        signature:
          type: string
          description: Stellar transaction signature
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - userId
        - courseId
        - title
        - issuedAt

    Quiz:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        title:
          type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestion'
        timeLimitSec:
          type: integer
      required:
        - id
        - courseId
        - title

    QuizQuestion:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        choices:
          type: array
          items:
            type: string
        multiple:
          type: boolean
          default: false

    QuizCreate:
      type: object
      required:
        - courseId
        - title
        - questions
      properties:
        courseId:
          type: string
        title:
          type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestion'
        timeLimitSec:
          type: integer

    QuizSubmission:
      type: object
      required:
        - answers
      properties:
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              selected:
                type: array
                items:
                  type: string
            required:
              - questionId
              - selected

    QuizResult:
      type: object
      properties:
        quizId:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 100
        passed:
          type: boolean
        details:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              correct:
                type: boolean
            required:
              - questionId
              - correct

    Assignment:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        title:
          type: string
        description:
          type: string
        dueAt:
          type: integer
        maxScore:
          type: number
          example: 100
      required:
        - id
        - courseId
        - title

    AssignmentCreate:
      type: object
      required:
        - courseId
        - title
        - description
        - dueAt
      properties:
        courseId:
          type: string
        title:
          type: string
        description:
          type: string
        dueAt:
          type: integer
        maxScore:
          type: number

    AssignmentSubmission:
      type: object
      required:
        - content
      properties:
        content:
          type: string
        attachments:
          type: array
          items:
            type: string
            format: uri

    Event:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          example: course.completed
        actorId:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - createdAt

    EventCreate:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
        payload:
          type: object
          additionalProperties: true

    Notification:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
          default: false
        createdAt:
          type: integer
      required:
        - id
        - userId
        - type
        - title

    NotificationCreate:
      type: object
      required:
        - userId
        - type
        - title
      properties:
        userId:
          type: string
        type:
          type: string
        title:
          type: string
        body:
          type: string

    Transaction:
      type: object
      properties:
        id:
          type: string
        hash:
          type: string
          description: Stellar transaction hash
        status:
          type: string
          enum:
            - pending
            - submitted
            - confirmed
            - failed
        operations:
          type: array
          items:
            type: object
            additionalProperties: true
        createdAt:
          type: integer
        confirmedAt:
          type: integer
          nullable: true
      required:
        - id
        - hash
        - status

    TransactionCreate:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          items:
            type: object
            additionalProperties: true
        memo:
          type: string

    SyncStatus:
      type: object
      properties:
        lastSyncAt:
          type: integer
          nullable: true
        pending:
          type: integer
        conflicts:
          type: integer
        status:
          type: string
          enum:
            - idle
            - syncing
            - error

    SyncPushRequest:
      type: object
      required:
        - changes
      properties:
        changes:
          type: array
          items:
            type: object
            additionalProperties: true

    CollaborationRoom:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        ownerId:
          type: string
        participants:
          type: array
          items:
            type: string
        createdAt:
          type: integer
        endedAt:
          type: integer
          nullable: true

    CollaborationRoomCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        participants:
          type: array
          items:
            type: string

    HolographicStatus:
      type: object
      properties:
        healthy:
          type: boolean
        shardsAvailable:
          type: integer
        totalCapacity:
          type: integer
        redundancyFactor:
          type: number

    ACORequest:
      type: object
      required:
        - userId
        - topics
      properties:
        userId:
          type: string
        topics:
          type: array
          items:
            type: string

    ACOResult:
      type: object
      properties:
        recommendedPath:
          type: array
          items:
            type: string
        score:
          type: number
        iterations:
          type: integer

    AnalyticsResponse:
      type: object
      properties:
        range:
          type: string
          example: 7d
        totals:
          type: object
          additionalProperties: true
        series:
          type: array
          items:
            type: object
            additionalProperties: true

    FederatedSession:
      type: object
      properties:
        id:
          type: string
        coordinator:
          type: string
        participants:
          type: array
          items:
            type: string
        round:
          type: integer
        status:
          type: string
        createdAt:
          type: integer

    FederatedSessionCreate:
      type: object
      required:
        - participants
      properties:
        participants:
          type: array
          items:
            type: string
        rounds:
          type: integer
          default: 10

    Swarm:
      type: object
      properties:
        id:
          type: string
        agentIds:
          type: array
          items:
            type: string
        goal:
          type: string
        status:
          type: string
          enum:
            - pending
            - active
            - completed
            - failed
        createdAt:
          type: integer

    SmartWallet:
      type: object
      properties:
        address:
          type: string
        owner:
          type: string
        deployedAt:
          type: integer
        features:
          type: array
          items:
            type: string
          example:
            - recovery
            - multisig

    SmartWalletDeployRequest:
      type: object
      required:
        - owner
      properties:
        owner:
          type: string
        features:
          type: array
          items:
            type: string

    SecureCommKey:
      type: object
      properties:
        id:
          type: string
        algorithm:
          type: string
          example: ML-KEM-768
        publicKey:
          type: string
        createdAt:
          type: integer

    AGITutorSession:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        topic:
          type: string
        startedAt:
          type: integer
        transcript:
          type: array
          items:
            type: object
            additionalProperties: true

    AGITutorSessionCreate:
      type: object
      required:
        - topic
      properties:
        topic:
          type: string
        context:
          type: object
          additionalProperties: true

    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          enum:
            - student
            - instructor
            - educator
            - admin
            - moderator
        permissions:
          type: array
          items:
            type: string

    AdminDashboard:
      type: object
      properties:
        users:
          type: integer
        courses:
          type: integer
        enrollments:
          type: integer
        transactions:
          type: integer
        recentEvents:
          type: array
          items:
            $ref: '#/components/schemas/Event'

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        username:
          type: string
        score:
          type: integer

    TimeLockCredentialCreate:
      type: object
      required:
        - userId
        - courseId
        - title
        - unlockAt
      properties:
        userId:
          type: string
        courseId:
          type: string
        title:
          type: string
        unlockAt:
          type: integer

    VRFRequest:
      type: object
      required:
        - seed
      properties:
        seed:
          type: string
          description: Hex-encoded seed for VRF

    VRFResponse:
      type: object
      properties:
        output:
          type: string
          description: Verifiable random output (hex)
        proof:
          type: string
          description: Cryptographic proof of correct evaluation
        publicKey:
          type: string

    TranslationRequest:
      type: object
      required:
        - text
        - target
      properties:
        text:
          type: string
        target:
          type: string
          example: es
        source:
          type: string
          example: en

    TranslationResponse:
      type: object
      properties:
        translatedText:
          type: string
        source:
          type: string
        target:
          type: string

    BridgeTransferRequest:
      type: object
      required:
        - amount
        - fromChain
        - toChain
        - recipient
      properties:
        amount:
          type: string
          description: Decimal string
        fromChain:
          type: string
          example: stellar
        toChain:
          type: string
          example: ethereum
        recipient:
          type: string

    BridgeTransferResponse:
      type: object
      properties:
        transferId:
          type: string
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
            - failed
        etaSeconds:
          type: integer

    AgentStatusSummary:
      type: object
      properties:
        total:
          type: integer
        running:
          type: integer
        idle:
          type: integer
        failed:
          type: integer
        lastUpdated:
          type: integer
